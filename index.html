<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Points</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    p {
      color: #cfcfcf;
      margin-top: 0;
    }

    .box {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }

    textarea,
    input {
      width: 100%;
      background: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    button {
      background: #ffd400;
      color: #000;
      border: none;
      padding: 12px 18px;
      margin-top: 15px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .section {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
    }

    .a-box { background: #1b5e20; }
    .b-box { background: #7f0000; }
    .strong-box { background: #2b2b2b; }
    .weak-box { background: #5d4037; }
    .edge-box { background: #311b92; }
    .why-box { background: #444; }
    .manip-box { background: #4a148c; }
    .fluff-box { background: #1f1f1f; }

    ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    li {
      margin-bottom: 6px;
    }

    video {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Debate Points</h1>
    <p>Drop text, link, or video. Get side-by-side breakdown instantly.</p>

    <div class="box">
      <textarea id="textInput" placeholder="Paste argument, transcript, or exchange..."></textarea>
      <input id="linkInput" placeholder="Paste video link (optional)" />
      <input type="file" id="videoUpload" accept="video/*" />
      <button onclick="analyze()">Analyze</button>
    </div>

    <div id="videoPreview"></div>

    <div id="results" class="box" style="display:none;">
      <h2>Results</h2>

      <div class="section a-box">
        <strong>Speaker A:</strong>
        <div id="speakerA">-</div>
      </div>

      <div class="section b-box">
        <strong>Speaker B:</strong>
        <div id="speakerB">-</div>
      </div>

      <div class="section strong-box">
        <strong>Strongest Point:</strong>
        <div id="strongestPoint">-</div>
      </div>

      <div class="section weak-box">
        <strong>Weakest Point:</strong>
        <div id="weakestPoint">-</div>
      </div>

      <div class="section edge-box">
        <strong>Current Edge:</strong>
        <div id="edge">-</div>
      </div>

      <div class="section why-box">
        <strong>Why:</strong>
        <div id="why">-</div>
      </div>

      <div class="section manip-box">
        <strong>Manipulation:</strong>
        <div id="manipulation">-</div>
      </div>

      <div class="section fluff-box">
        <strong>Fluff:</strong>
        <div id="fluff">-</div>
      </div>

      <div class="section">
        <strong>Sources:</strong>
        <ul id="sources">
          <li>No sources listed</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("videoUpload").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        document.getElementById("videoPreview").innerHTML =
          '<video controls src="' + url + '"></video>';
      }
    });

    async function analyze() {
      const text = document.getElementById("textInput").value.trim();

      if (!text) {
        alert("Put something in.");
        return;
      }

      document.getElementById("results").style.display = "block";

      try {
        const res = await fetch("/api/analyze2", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById("speakerA").innerText = "Error";
          document.getElementById("speakerB").innerText = "Error";
          document.getElementById("strongestPoint").innerText = "Error";
          document.getElementById("weakestPoint").innerText = "Error";
          document.getElementById("edge").innerText = "Error";
          document.getElementById("why").innerText = data.error || "Analysis failed";
          document.getElementById("manipulation").innerText = "Error";
          document.getElementById("fluff").innerText = "Error";
          document.getElementById("sources").innerHTML = "<li>No sources listed</li>";
          return;
        }

        document.getElementById("speakerA").innerText = data.speakerA || "-";
        document.getElementById("speakerB").innerText = data.speakerB || "-";
        document.getElementById("strongestPoint").innerText = data.strongestPoint || "-";
        document.getElementById("weakestPoint").innerText = data.weakestPoint || "-";
        document.getElementById("edge").innerText = data.edge || "-";
        document.getElementById("why").innerText = data.why || "-";
        document.getElementById("manipulation").innerText = data.manipulation || "-";
        document.getElementById("fluff").innerText = data.fluff || "-";

        document.getElementById("sources").innerHTML =
          Array.isArray(data.sources) && data.sources.length
            ? data.sources.map(s => "<li>" + s + "</li>").join("")
            : "<li>No sources listed</li>";

      } catch (err) {
        document.getElementById("speakerA").innerText = "Error";
        document.getElementById("speakerB").innerText = "Error";
        document.getElementById("strongestPoint").innerText = "Error";
        document.getElementById("weakestPoint").innerText = "Error";
        document.getElementById("edge").innerText = "Error";
        document.getElementById("why").innerText = "Request failed";
        document.getElementById("manipulation").innerText = "Error";
        document.getElementById("fluff").innerText = "Error";
        document.getElementById("sources").innerHTML = "<li>No sources listed</li>";
      }
    }
  </script>
</body>
</html>
