<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Points</title>

<style>
body {
  margin:0;
  font-family: system-ui, Arial;
  background:#0b0b0b;
  color:#fff;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:32px;
}

.box {
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:15px;
  margin-top:15px;
}

textarea, input {
  width:100%;
  background:#000;
  color:#fff;
  border:1px solid #333;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

button {
  background:#ffd400;
  color:#000;
  border:none;
  padding:12px 18px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
}

.results div {
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}

.truth { background:#1b5e20; }
.lies { background:#7f0000; }
.opinion { background:#444; }
.foolery { background:#5d4037; }
.manipulation { background:#311b92; }

video {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Debate Points</h1>
<p>Drop text, link, or video. Get breakdown instantly.</p>

<div class="box">
  <textarea id="textInput" placeholder="Paste argument or transcript..."></textarea>

  <input id="linkInput" placeholder="Paste video link (optional)" />

  <input type="file" id="videoUpload" accept="video/*" />

  <button onclick="analyze()">Analyze</button>
</div>

<div id="videoPreview"></div>

<div id="results" class="results box" style="display:none;">
  <h2>Results</h2>

  <div class="truth">Truth: <span id="truthScore"></span></div>
  <div class="lies">Lies: <span id="lieScore"></span></div>
  <div class="opinion">Opinion: <span id="opinionScore"></span></div>
  <div class="foolery">Foolery: <span id="foolScore"></span></div>
  <div class="manipulation">Manipulation: <span id="manipScore"></span></div>

  <div style="margin-top:15px;">
    <strong>Reality Scale:</strong>
    <div id="scale"></div>
  </div>

  <div style="margin-top:15px;">
    <strong>Sources:</strong>
    <ul id="sources"></ul>
  </div>
</div>

</div>

<script>
document.getElementById("videoUpload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const url = URL.createObjectURL(file);
    document.getElementById("videoPreview").innerHTML =
      `<video controls src="${url}"></video>`;
  }
});
async function analyze(){
  const text = document.getElementById("textInput").value;

  if(!text){
    alert("Put something in.");
    return;
  }

  document.getElementById("results").style.display = "block";

  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  // Show AI output (simple for now)
  document.getElementById("scale").innerText = data.result;

  // Clear old fake scores
  document.getElementById("truthScore").innerText = "-";
  document.getElementById("lieScore").innerText = "-";
  document.getElementById("opinionScore").innerText = "-";
  document.getElementById("foolScore").innerText = "-";
  document.getElementById("manipScore").innerText = "-";

  document.getElementById("sources").innerHTML = "<li>AI analysis</li>";
}
