<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reasoning Audit</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef3ff;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

textarea, input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.primary {
  background: #4f7cff;
  color: white;
}

.secondary {
  background: white;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  gap: 15px;
}

.grid-2 {
  grid-template-columns: 1fr 1fr;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.label {
  font-size: 12px;
  color: gray;
}

.value {
  font-size: 18px;
  font-weight: bold;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Reasoning Audit</h1>

<div class="card">
  <div class="label">Transcript / Text</div>
  <textarea id="text"></textarea>

  <div class="label">Link (optional)</div>
  <input id="link" />

  <button class="primary" onclick="analyze()">Analyze</button>
  <button class="secondary" onclick="clearAll()">Clear</button>

  <div id="error" class="error"></div>
</div>

<div class="grid grid-2">

<div class="card">
  <div class="label">Structure</div>
  <div id="structure" class="value">-</div>

  <div class="label">Topics</div>
  <div id="topics">-</div>

  <div class="label">Worldview</div>
  <div id="worldview">-</div>
</div>

<div class="card">
  <div class="label">Clarity</div>
  <div id="clarity">-</div>

  <div class="label">Integrity</div>
  <div id="integrity">-</div>

  <div class="label">Honesty</div>
  <div id="honesty">-</div>

  <div class="label">Manipulation</div>
  <div id="manipulation">-</div>

  <div class="label">BSN</div>
  <div id="bsn">-</div>
</div>

</div>

</div>

<script>
const API_URL = "/api/analyze";

function set(id, value) {
  document.getElementById(id).innerText = value ?? "-";
}

function clearAll() {
  document.getElementById("text").value = "";
  document.getElementById("link").value = "";
  document.getElementById("error").innerText = "";

  ["structure","topics","worldview","clarity","integrity","honesty","manipulation","bsn"]
    .forEach(id => set(id, "-"));
}

async function analyze() {
  const text = document.getElementById("text").value;
  const link = document.getElementById("link").value;

  document.getElementById("error").innerText = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text, link })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Request failed");
    }

    set("structure", data.structure);
    set("topics", (data.topics || []).join(", "));
    set("worldview", (data.worldview || []).join(", "));

    set("clarity", data?.scores?.clarity);
    set("integrity", data?.scores?.integrity);
    set("honesty", data?.scores?.honesty);
    set("manipulation", data?.scores?.manipulation);
    set("bsn", data?.scores?.bsn);

  } catch (err) {
    document.getElementById("error").innerText = err.message;
  }
}
</script>

</body>
</html>
