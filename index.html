<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Points</title>

<style>
body {
  margin:0;
  font-family: system-ui, Arial;
  background:#0b0b0b;
  color:#fff;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:32px;
}

.box {
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:15px;
  margin-top:15px;
}

textarea, input {
  width:100%;
  background:#000;
  color:#fff;
  border:1px solid #333;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

button {
  background:#ffd400;
  color:#000;
  border:none;
  padding:12px 18px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
}

.results div {
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}

.truth { background:#1b5e20; }
.lies { background:#7f0000; }
.opinion { background:#444; }
.foolery { background:#5d4037; }
.manipulation { background:#311b92; }

video {
  width:100%;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Debate Points</h1>
<p>Drop text, link, or video. Get breakdown instantly.</p>

<div class="box">
  <textarea id="textInput" placeholder="Paste argument or transcript..."></textarea>

  <input id="linkInput" placeholder="Paste video link (optional)" />

  <input type="file" id="videoUpload" accept="video/*" />

  <button onclick="analyze()">Analyze</button>
</div>

<div id="videoPreview"></div>

<div id="results" class="results box" style="display:none;">
  <h2>Results</h2>

  <div class="truth">Truth: <span id="truthScore"></span></div>
  <div class="lies">Lies: <span id="lieScore"></span></div>
  <div class="opinion">Opinion: <span id="opinionScore"></span></div>
  <div class="foolery">Foolery: <span id="foolScore"></span></div>
  <div class="manipulation">Manipulation: <span id="manipScore"></span></div>

  <div style="margin-top:15px;">
    <strong>Reality Scale:</strong>
    <div id="scale"></div>
  </div>

  <div style="margin-top:15px;">
    <strong>Sources:</strong>
    <ul id="sources"></ul>
  </div>
</div>

</div>

<script>
document.getElementById("videoUpload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const url = URL.createObjectURL(file);
    document.getElementById("videoPreview").innerHTML =
      `<video controls src="${url}"></video>`;
  }
});

function analyze(){
  const text = document.getElementById("textInput").value;

  if(!text){
    alert("Put something in, genius.");
    return;
  }

  document.getElementById("results").style.display = "block";

  // Fake scoring (for now)
  const truth = Math.floor(Math.random()*40)+20;
  const lies = Math.floor(Math.random()*30);
  const opinion = Math.floor(Math.random()*40);
  const fool = Math.floor(Math.random()*20);
  const manip = Math.floor(Math.random()*25);

  document.getElementById("truthScore").innerText = truth + "%";
  document.getElementById("lieScore").innerText = lies + "%";
  document.getElementById("opinionScore").innerText = opinion + "%";
  document.getElementById("foolScore").innerText = fool + "%";
  document.getElementById("manipScore").innerText = manip + "%";

  let scale = "Balanced Reality";
  if(lies > 25 || manip > 20) scale = "Distorted";
  if(fool > 15) scale = "Clown Territory";

  document.getElementById("scale").innerText = scale;

  const sources = [
    "Primary source (if detected)",
    "Secondary reference",
    "Contextual inference"
  ];

  document.getElementById("sources").innerHTML =
    sources.map(s => `<li>${s}</li>`).join("");
}
</script>

</body>
</html>
