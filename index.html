<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Points</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      color: #f5f7fa;
      background:
        radial-gradient(circle at top right, rgba(0, 255, 170, 0.08), transparent 25%),
        radial-gradient(circle at bottom left, rgba(0, 128, 255, 0.08), transparent 30%),
        linear-gradient(180deg, #05070b 0%, #0a0f16 100%);
      min-height: 100vh;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,170,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.15));
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero, .panel {
      background: rgba(10, 15, 22, 0.9);
      border: 1px solid #1d2938;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 255, 170, 0.04);
    }

    .hero { padding: 18px; margin-bottom: 18px; }
    .panel { padding: 16px; margin-top: 16px; }

    h1 { margin: 0 0 8px; font-size: 36px; }
    .subtext { color: #a8b3c2; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .full { grid-column: 1 / -1; }

    input, textarea {
      width: 100%;
      background: #05080d;
      color: #f5f7fa;
      border: 1px solid #263445;
      border-radius: 12px;
      padding: 12px;
    }

    textarea { min-height: 280px; }

    .btn {
      background: linear-gradient(135deg, #ffe600, #ffbf00);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      background: #0a1017;
      border: 1px solid #233142;
      border-radius: 16px;
      padding: 16px;
    }

    .block {
      background: #05080d;
      padding: 10px;
      border-radius: 10px;
      margin-top: 6px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>

  <div class="wrap">

    <div class="hero">
      <h1>Debate Points</h1>
      <p class="subtext">Paste transcript. We separate truth, lies, opinion, and nonsense.</p>
    </div>

    <div class="panel">
      <div class="grid">

        <div>
          <input id="teamAName" placeholder="Team A Name" />
        </div>

        <div>
          <input id="teamBName" placeholder="Team B Name" />
        </div>

        <div class="full">
          <textarea id="transcriptText" placeholder="Paste transcript..."></textarea>
        </div>

        <div class="full">
          <button class="btn" onclick="analyze()">Analyze Debate</button>
        </div>

      </div>
    </div>

    <div id="results" class="panel" style="display:none;">
      <h2>Results</h2>

      <div class="results-grid">

        <div class="card">
          <h3 id="aName">Team A</h3>
          <div>Main</div><div class="block" id="aMain"></div>
          <div>Truth</div><div class="block" id="aTruth"></div>
          <div>Lies</div><div class="block" id="aLies"></div>
          <div>Opinion</div><div class="block" id="aOpinion"></div>
          <div>Lala</div><div class="block" id="aLala"></div>
        </div>

        <div class="card">
          <h3 id="bName">Team B</h3>
          <div>Main</div><div class="block" id="bMain"></div>
          <div>Truth</div><div class="block" id="bTruth"></div>
          <div>Lies</div><div class="block" id="bLies"></div>
          <div>Opinion</div><div class="block" id="bOpinion"></div>
          <div>Lala</div><div class="block" id="bLala"></div>
        </div>

      </div>

      <div class="card" style="margin-top:16px;">
        <div>Winner</div><div class="block" id="winner"></div>
        <div>BS Meter</div><div class="block" id="bs"></div>
        <div>Why</div><div class="block" id="why"></div>
      </div>

    </div>

  </div>

<script>
async function analyze() {
  const transcript = document.getElementById("transcriptText").value;

  if (!transcript) {
    alert("Paste transcript");
    return;
  }

  const res = await fetch("/api/analyze2", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      teamAName: document.getElementById("teamAName").value,
      teamBName: document.getElementById("teamBName").value,
      transcriptText: transcript
    })
  });

  const data = await res.json();

  document.getElementById("results").style.display = "block";

  document.getElementById("aName").innerText = data.teamAName;
  document.getElementById("bName").innerText = data.teamBName;

  document.getElementById("aMain").innerText = data.teamA.main_position;
  document.getElementById("aTruth").innerText = data.teamA.truth;
  document.getElementById("aLies").innerText = data.teamA.lies;
  document.getElementById("aOpinion").innerText = data.teamA.opinion;
  document.getElementById("aLala").innerText = data.teamA.lala;

  document.getElementById("bMain").innerText = data.teamB.main_position;
  document.getElementById("bTruth").innerText = data.teamB.truth;
  document.getElementById("bLies").innerText = data.teamB.lies;
  document.getElementById("bOpinion").innerText = data.teamB.opinion;
  document.getElementById("bLala").innerText = data.teamB.lala;

  document.getElementById("winner").innerText = data.winner;
  document.getElementById("bs").innerText = data.bsMeter;
  document.getElementById("why").innerText = data.why;
}
</script>

</body>
</html>
